<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="fonts/fontawesome/css/all.min.css">
    <title>سایت‌های ایرانی - نت ملی</title>
    <script>
        // Prevent FOUC: set theme before any rendering
        (function(){
            var t = localStorage.getItem('theme');
            if (!t) t = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', t);
        })();
    </script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Dark Mode Toggle -->
    <button class="theme-toggle" id="themeToggle" title="تغییر حالت نمایش">
        <span class="icon-moon">🌙</span>
        <span class="icon-sun">☀️</span>
    </button>

    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="header-icon"></div>
            <h1>سایت‌های ایرانی</h1>
            <p class="subtitle">دسترسی سریع به سایت‌های کاربردی در زمان نت ملی</p>
        </header>

        <!-- Search Section -->
        <div class="search-section" id="searchSection">
            <div class="search-wrapper">
                <!-- Search Icon (inline SVG) -->
                <span class="search-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8"/>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                    </svg>
                </span>
                <input type="text" id="searchInput" placeholder="جستجو با نام سایت، آدرس یا تگ ... مثل دانلود، فیلم، بازی، download" autocomplete="off">
                <button class="clear-search" id="clearSearch" title="پاک کردن">✕</button>
            </div>
            <div class="results-count" id="resultsCount"></div>
            <div class="tags-container" id="tagsContainer"></div>
            <button class="reset-tags" id="resetTags">✕ پاک کردن فیلترها</button>
        </div>

        <!-- Toolbar Row: Sort, View, Expand All, Bookmark Filter, Suggest -->
        <div class="toolbar-row" id="toolbarRow">
            <select class="sort-select" id="sortSelect" title="مرتب‌سازی">
                <option value="default">📦 پیش‌فرض (دسته‌بندی)</option>
                <option value="name">🔤 نام (الفبا)</option>
                <option value="recommended">⭐ پیشنهادی اول</option>
                <option value="id">🔢 شناسه</option>
            </select>
            <button class="toolbar-btn" id="viewToggle" title="تغییر نما">
                <i class="fa-solid fa-list"></i> <span>نمای لیستی</span>
            </button>
            <button class="toolbar-btn" id="expandAllBtn" title="باز/بسته کردن همه">
                <i class="fa-solid fa-angles-down"></i> <span>باز کردن همه</span>
            </button>
            <button class="toolbar-btn" id="bookmarkFilterBtn" title="نمایش بوکمارک‌ها">
                <i class="fa-solid fa-bookmark"></i> <span>بوکمارک‌ها</span>
            </button>

        </div>

        <!-- Sites Grid -->
        <div class="sites-grid" id="sitesGrid"></div>

        <!-- Empty State -->
        <div class="empty-state" id="emptyState">
            <div class="empty-icon">🔍</div>
            <h3>نتیجه‌ای یافت نشد</h3>
            <p>با عبارت دیگری جستجو کنید یا فیلتر تگ‌ها را تغییر دهید</p>
        </div>

        <!-- Footer -->
        <footer class="footer">
            مناسب زمان نت ملی • لیست در حال به‌روزرسانی
            <span class="footer-date-wrap" style="display:none;">
                &bull; این فهرست در تاریخ <span id="footerDate"></span> به‌روزرسانی شده است
            </span>
        </footer>
    </div>

    <!-- Back to Top Button -->
    <button class="back-to-top" id="backToTop" aria-label="بازگشت به بالا" title="بازگشت به بالا">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="18 15 12 9 6 15"/>
        </svg>
    </button>



    <script src="js/main.js"></script>
</body>
</html>
